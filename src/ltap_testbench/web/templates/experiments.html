<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Experiments · LtAP LTE Testbench</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --surface: #ffffff;
        --text: #18212f;
        --muted: #617083;
        --line: #d7dee8;
        --green: #0f766e;
        --bad: #b91c1c;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text); font: 14px/1.45 system-ui, sans-serif; }
      header { background: #172033; color: #fff; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
      main { max-width: 1180px; margin: 0 auto; padding: 18px; display: grid; gap: 14px; }
      section { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 14px; }
      h1, h2 { margin: 0; letter-spacing: 0; }
      h1 { font-size: 20px; }
      h2 { font-size: 16px; margin-bottom: 10px; }
      label { display: grid; gap: 4px; font-size: 12px; font-weight: 650; color: var(--muted); }
      input, select, textarea { min-height: 36px; border: 1px solid var(--line); border-radius: 6px; padding: 6px 8px; font: inherit; color: var(--text); background: #fff; width: 100%; }
      textarea { min-height: 72px; resize: vertical; }
      button, .button { min-height: 36px; border: 1px solid var(--line); border-radius: 6px; padding: 7px 12px; font: inherit; background: #fff; color: var(--text); cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
      button.primary { background: var(--green); border-color: var(--green); color: #fff; }
      button:disabled { opacity: .55; cursor: wait; }
      table { border-collapse: collapse; width: 100%; table-layout: fixed; }
      th, td { border-bottom: 1px solid #e8edf3; text-align: left; padding: 7px; vertical-align: top; overflow-wrap: anywhere; }
      th { color: var(--muted); font-weight: 650; }
      code { background: #edf2f7; padding: 2px 4px; border-radius: 4px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 10px; }
      .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: end; }
      .muted { color: var(--muted); }
      @media (max-width: 820px) {
        main { padding: 12px; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Experiments</h1>
      <div class="toolbar">
        <a class="button" href="/">Dashboard</a>
        <a class="button" href="/analytics">Analytics</a>
        <a class="button" href="/antennas">Antennas</a>
        <span>v{{ version }}</span>
      </div>
    </header>
    <main>
      <section>
        <h2>Create Test Site</h2>
        <div class="grid">
          <label>Slug
            <input id="site-slug" placeholder="workshop-window">
          </label>
          <label>Name
            <input id="site-name" placeholder="Workshop window">
          </label>
          <label>Indoor / outdoor
            <input id="site-indoor-outdoor" placeholder="indoor">
          </label>
          <label>Location
            <input id="site-location" placeholder="fixed router shelf">
          </label>
        </div>
        <div class="toolbar" style="margin-top:12px;">
          <button id="create-site" class="primary" type="button">Create Site</button>
        </div>
      </section>

      <section>
        <h2>Create Experiment</h2>
        <div class="grid">
          <label>Name
            <input id="experiment-name" placeholder="RouterOS 7.19 baseline">
          </label>
          <label>Comparison dimension
            <select id="experiment-dimension">
              <option value="general_repeatability">general repeatability</option>
              <option value="firmware">firmware</option>
              <option value="routerboot">routerboot</option>
              <option value="modem_model">modem model</option>
              <option value="modem_firmware">modem firmware</option>
              <option value="antenna">antenna</option>
            </select>
          </label>
          <label>Protocol
            <select id="experiment-protocol">
              {% for protocol in benchmark_protocols %}
              <option value="{{ protocol.slug }}">{{ protocol.name }} · {{ protocol.version }}</option>
              {% endfor %}
            </select>
          </label>
          <label>Site
            <select id="experiment-site">
              <option value="">No site</option>
            </select>
          </label>
        </div>
        <label style="margin-top:10px;">Hypothesis
          <textarea id="experiment-hypothesis" placeholder="What should this experiment test?"></textarea>
        </label>
        <div class="toolbar" style="margin-top:12px;">
          <button id="create-experiment" class="primary" type="button">Create Experiment</button>
        </div>
      </section>

      <section>
        <h2>Create Variant</h2>
        <div class="grid">
          <label>Experiment
            <select id="variant-experiment"></select>
          </label>
          <label>Label
            <input id="variant-label" placeholder="baseline, candidate, roof panel">
          </label>
          <label>Expected RouterOS
            <input id="variant-routeros" placeholder="optional">
          </label>
          <label>Expected RouterBOOT
            <input id="variant-routerboot" placeholder="optional">
          </label>
        </div>
        <div class="toolbar" style="margin-top:12px;">
          <button id="create-variant" class="primary" type="button">Create Variant</button>
          <button id="refresh" type="button">Refresh</button>
        </div>
        <p id="message" class="muted"></p>
      </section>

      <section>
        <h2>Experiments</h2>
        <table>
          <thead>
            <tr>
              <th>Experiment</th><th>Dimension</th><th>Protocol</th><th>Variants</th>
            </tr>
          </thead>
          <tbody id="experiments"></tbody>
        </table>
      </section>
    </main>
    <script>
      const $ = (id) => document.getElementById(id);
      const request = async (url, options = {}) => {
        const response = await fetch(url, {
          headers: {"Content-Type": "application/json", ...(options.headers || {})},
          ...options
        });
        const text = await response.text();
        let payload = text;
        try { payload = text ? JSON.parse(text) : {}; } catch (_error) {}
        if (!response.ok) throw new Error(typeof payload === "string" ? payload : JSON.stringify(payload, null, 2));
        return payload;
      };
      const option = (value, label) => `<option value="${value}">${label}</option>`;
      const load = async () => {
        const [sites, experiments] = await Promise.all([
          request("/api/v1/test-sites"),
          request("/api/v1/experiments"),
        ]);
        $("experiment-site").innerHTML = option("", "No site") + sites.map((site) => option(site.id, `${site.name} · ${site.slug}`)).join("");
        $("variant-experiment").innerHTML = experiments.map((experiment) => option(experiment.id, experiment.name)).join("");
        if (!experiments.length) {
          $("variant-experiment").innerHTML = option("", "Create an experiment first");
        }
        const rows = [];
        for (const experiment of experiments) {
          const detail = await request(`/api/v1/experiments/${experiment.id}`);
          const variants = (detail.variants || []).map((variant) => `<code>${variant.label}</code>`).join(" ");
          rows.push(`<tr>
            <td><strong>${experiment.name}</strong><br><span class="muted">${experiment.hypothesis || ""}</span></td>
            <td>${experiment.comparison_dimension}</td>
            <td><code>${experiment.protocol_slug || "-"}</code><br><span class="muted">${(experiment.protocol_hash || "").slice(0, 12)}</span></td>
            <td>${variants || "<span class=\"muted\">No variants yet</span>"}</td>
          </tr>`);
        }
        $("experiments").innerHTML = rows.join("") || "<tr><td colspan=\"4\" class=\"muted\">No experiments yet.</td></tr>";
      };
      const createSite = async () => {
        const row = await request("/api/v1/test-sites", {
          method: "POST",
          body: JSON.stringify({
            slug: $("site-slug").value.trim(),
            name: $("site-name").value.trim(),
            indoor_outdoor: $("site-indoor-outdoor").value.trim(),
            location_description: $("site-location").value.trim(),
          })
        });
        $("message").textContent = `Created site ${row.slug}`;
        await load();
      };
      const createExperiment = async () => {
        const payload = {
          name: $("experiment-name").value.trim(),
          comparison_dimension: $("experiment-dimension").value,
          protocol_slug: $("experiment-protocol").value,
          site_id: $("experiment-site").value ? Number($("experiment-site").value) : null,
          hypothesis: $("experiment-hypothesis").value.trim(),
        };
        const row = await request("/api/v1/experiments", {
          method: "POST",
          body: JSON.stringify(payload)
        });
        $("message").textContent = `Created experiment ${row.name}`;
        await load();
      };
      const createVariant = async () => {
        const experimentId = $("variant-experiment").value;
        if (!experimentId) throw new Error("Create an experiment first.");
        const row = await request(`/api/v1/experiments/${experimentId}/variants`, {
          method: "POST",
          body: JSON.stringify({
            label: $("variant-label").value.trim(),
            expected_routeros_version: $("variant-routeros").value.trim() || null,
            expected_routerboot_version: $("variant-routerboot").value.trim() || null,
          })
        });
        $("message").textContent = `Created variant ${row.label}`;
        await load();
      };
      for (const [id, action] of [
        ["create-site", createSite],
        ["create-experiment", createExperiment],
        ["create-variant", createVariant],
      ]) {
        $(id).addEventListener("click", async () => {
          $(id).disabled = true;
          try { await action(); }
          catch (error) { $("message").textContent = error.message; }
          finally { $(id).disabled = false; }
        });
      }
      $("refresh").addEventListener("click", () => load().catch((error) => {
        $("message").textContent = error.message;
      }));
      load().catch((error) => { $("message").textContent = error.message; });
    </script>
  </body>
</html>
