<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Start a test</title>
    <style>
      :root {
        --bg: #f4f6f8;
        --surface: #fff;
        --text: #172033;
        --muted: #64748b;
        --line: #d7dee8;
        --ok: #166534;
        --bad: #b91c1c;
        --brand: #0f766e;
      }
      * { box-sizing: border-box; }
      body { margin: 0; background: var(--bg); color: var(--text); font: 14px/1.45 system-ui, sans-serif; }
      header { background: #172033; color: #fff; padding: 14px 20px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
      main { max-width: 980px; margin: 0 auto; padding: 18px; display: grid; gap: 14px; }
      section { background: var(--surface); border: 1px solid var(--line); border-radius: 8px; padding: 14px; }
      h1, h2, h3 { margin: 0; letter-spacing: 0; }
      h1 { font-size: 20px; }
      h2 { font-size: 18px; margin-bottom: 10px; }
      h3 { font-size: 14px; margin: 10px 0 6px; }
      label { display: grid; gap: 4px; font-size: 12px; font-weight: 650; color: var(--muted); }
      input, select { min-height: 36px; border: 1px solid var(--line); border-radius: 6px; padding: 6px 8px; font: inherit; color: var(--text); background: #fff; width: 100%; }
      button, .button { min-height: 36px; border: 1px solid var(--line); border-radius: 6px; padding: 7px 12px; font: inherit; background: #fff; color: var(--text); cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; justify-content: center; }
      button.primary { background: var(--brand); border-color: var(--brand); color: #fff; }
      button:disabled { opacity: .55; cursor: not-allowed; }
      table { border-collapse: collapse; width: 100%; table-layout: fixed; }
      th, td { border-bottom: 1px solid #e8edf3; text-align: left; padding: 7px; vertical-align: top; overflow-wrap: anywhere; }
      th { color: var(--muted); font-weight: 650; }
      .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); gap: 10px; }
      .toolbar { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
      .segmented { display: inline-grid; grid-auto-flow: column; border: 1px solid var(--line); border-radius: 7px; overflow: hidden; }
      .segmented button { border: 0; border-radius: 0; }
      .segmented button.active { background: #e6fffb; color: #115e59; font-weight: 700; }
      .quick button { min-height: 30px; padding: 4px 8px; }
      .muted { color: var(--muted); }
      .summary { background: #f8fafc; border: 1px solid var(--line); border-radius: 6px; padding: 10px; }
      .preview { display: grid; gap: 8px; }
      .bad { color: var(--bad); }
      .ok { color: var(--ok); }
      .hidden { display: none; }
      @media (max-width: 760px) {
        main { padding: 12px; }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Start a test</h1>
      <div class="toolbar">
        <a class="button" href="/analytics">Analytics</a>
        <a class="button" href="/advanced-tests">Advanced</a>
        <span>v{{ version }}</span>
      </div>
    </header>
    <main>
      <section>
        <h2>Start a test</h2>
        <div class="grid">
          <label>Test profile
            <select id="profile"></select>
          </label>
          <label>Campaign name
            <input id="campaign-name" placeholder="Generated automatically">
          </label>
        </div>
        <p id="profile-description" class="muted"></p>
        <div id="profile-summary" class="summary"></div>

        <h3>Campaign target</h3>
        <div class="toolbar">
          <div class="segmented">
            <button id="mode-streamed" type="button" class="active">Total streamed time</button>
            <button id="mode-runs" type="button">Number of valid runs</button>
          </div>
          <label id="streamed-target">Value
            <input id="target-value" type="number" min="0.1" step="0.1" value="6">
          </label>
          <label id="streamed-unit">Unit
            <select id="target-unit">
              <option value="hours" selected>hours</option>
              <option value="minutes">minutes</option>
            </select>
          </label>
          <label id="run-target" class="hidden">Valid runs
            <input id="target-runs" type="number" min="1" step="1" value="12">
          </label>
        </div>
        <div class="toolbar quick" style="margin-top:8px;">
          <button type="button" data-hours="1">1 h</button>
          <button type="button" data-hours="2">2 h</button>
          <button type="button" data-hours="4">4 h</button>
          <button type="button" data-hours="6">6 h</button>
          <button type="button" data-hours="8">8 h</button>
          <button type="button" data-hours="12">12 h</button>
        </div>

        <h3>Start</h3>
        <div class="toolbar">
          <div class="segmented">
            <button id="start-now" type="button" class="active">Start now</button>
            <button id="start-schedule" type="button">Schedule</button>
          </div>
          <label id="schedule-field" class="hidden">Local start time
            <input id="start-at" type="datetime-local">
          </label>
        </div>

        <h3>Context</h3>
        <div class="grid">
          <label>Router
            <select id="router">
              {% for router in routers %}
              <option value="{{ router.slug }}">{{ router.display_name }} · {{ router.slug }}</option>
              {% endfor %}
            </select>
          </label>
          <label>Antenna
            <select id="antenna">
              <option value="">Choose antenna</option>
              {% for profile in antenna_profiles %}
              <option value="{{ profile.id }}">{{ profile.manufacturer }} {{ profile.model }}</option>
              {% endfor %}
            </select>
          </label>
          <label>Experiment
            <select id="experiment">
              <option value="">None</option>
              {% for experiment in experiments %}
              <option value="{{ experiment.id }}">{{ experiment.name }}</option>
              {% endfor %}
            </select>
          </label>
          <label>Variant
            <select id="variant">
              <option value="">None</option>
              {% for variant in variant_options %}
              <option value="{{ variant.id }}" data-experiment-id="{{ variant.experiment_id }}">{{ variant.label }}</option>
              {% endfor %}
            </select>
          </label>
        </div>

        <h3>Campaign preview</h3>
        <div id="preview" class="preview summary">Loading preview...</div>
        <div class="toolbar" style="margin-top:12px;">
          <button id="create-campaign" class="primary" type="button">Start test campaign</button>
          <button id="refresh-campaigns" type="button">Refresh campaigns</button>
        </div>
        <div id="message" class="muted" style="margin-top:8px;"></div>
      </section>

      <section>
        <h2>Recent test campaigns</h2>
        <table>
          <thead>
            <tr>
              <th>Name</th><th>Profile</th><th>Progress</th><th>Streamed time</th><th>State</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="campaigns"></tbody>
        </table>
      </section>
    </main>
    <script>
      const $ = (id) => document.getElementById(id);
      let profiles = [];
      let targetMode = "streamed_time";
      let startMode = "now";
      let previewTimer = null;

      const request = async (url, options = {}) => {
        const response = await fetch(url, {
          headers: {"Content-Type": "application/json", ...(options.headers || {})},
          ...options
        });
        const text = await response.text();
        let payload = text;
        try { payload = text ? JSON.parse(text) : {}; } catch (_error) {}
        if (!response.ok) throw new Error(typeof payload === "string" ? payload : JSON.stringify(payload, null, 2));
        return payload;
      };
      const fmtDuration = (seconds) => {
        const n = Math.round(Number(seconds) || 0);
        const h = Math.floor(n / 3600);
        const m = Math.floor((n % 3600) / 60);
        if (h && m) return `${h} h ${m} min`;
        if (h) return `${h} h`;
        if (m) return `${m} min`;
        return `${n} s`;
      };
      const payload = () => {
        const experimentId = $("experiment").value;
        const variantId = $("variant").value;
        return {
          profile_slug: $("profile").value,
          target_mode: targetMode,
          target_value: targetMode === "streamed_time" ? Number($("target-value").value) : Number($("target-runs").value),
          target_unit: targetMode === "streamed_time" ? $("target-unit").value : "runs",
          router_slug: $("router").value,
          antenna_profile_id: $("antenna").value ? Number($("antenna").value) : null,
          experiment_id: experimentId ? Number(experimentId) : null,
          variant_id: variantId ? Number(variantId) : null,
          start_at: startMode === "schedule" ? $("start-at").value : null,
          name: $("campaign-name").value.trim() || null
        };
      };
      const renderProfile = () => {
        const profile = profiles.find((row) => row.slug === $("profile").value);
        if (!profile) return;
        $("profile-description").textContent = profile.description;
        const summary = profile.summary || {};
        $("profile-summary").innerHTML = `
          Video: ${summary.video_bitrate_mbit_s ?? "-"} Mbps · ${summary.video_fps ?? "-"} fps · ${summary.scenario || "-"}<br>
          Per run: ${fmtDuration(profile.per_run_stream_seconds)} streamed video<br>
          Paths: both LTE paths in parallel<br>
          Cooldown: ${fmtDuration(summary.cooldown_seconds)}<br>
          Comparable: ${profile.comparable ? "yes" : "no"}<br>
          Profile version: v${profile.version}
        `;
      };
      const renderPreview = async () => {
        try {
          const data = await request("/api/v1/test-campaigns/preview", {
            method: "POST",
            body: JSON.stringify(payload())
          });
          const errors = data.blocking_errors || [];
          const warnings = data.warnings || [];
          $("preview").innerHTML = `
            <strong>${data.profile.name} v${data.profile.version}</strong><br>
            ${data.target_valid_runs} valid runs · ${fmtDuration(data.planned_stream_seconds)} planned streamed video<br>
            ${fmtDuration(data.estimated_successful_run_wall_seconds)} estimated per successful run<br>
            ${fmtDuration(data.estimated_minimum_campaign_wall_seconds)} minimum wall-clock time<br>
            ${fmtDuration(data.estimated_worst_case_campaign_wall_seconds)} worst-case wall-clock time<br>
            Stop conditions: ${data.target_valid_runs} valid runs, ${data.max_attempts} attempts, scheduled deadline, ${data.max_consecutive_failures} consecutive failures<br>
            ${warnings.length ? `<span class="muted">Warnings: ${warnings.join(", ")}</span><br>` : ""}
            ${errors.length ? `<span class="bad">Blocking: ${errors.join(", ")}</span>` : `<span class="ok">Ready to create</span>`}
          `;
          $("create-campaign").disabled = errors.length > 0;
          $("create-campaign").textContent = startMode === "schedule" ? "Schedule test campaign" : "Start test campaign";
        } catch (error) {
          $("preview").textContent = error.message;
          $("create-campaign").disabled = true;
        }
      };
      const schedulePreview = () => {
        clearTimeout(previewTimer);
        previewTimer = setTimeout(renderPreview, 120);
      };
      const setTargetMode = (mode) => {
        targetMode = mode;
        $("mode-streamed").classList.toggle("active", mode === "streamed_time");
        $("mode-runs").classList.toggle("active", mode === "valid_runs");
        $("streamed-target").classList.toggle("hidden", mode !== "streamed_time");
        $("streamed-unit").classList.toggle("hidden", mode !== "streamed_time");
        $("run-target").classList.toggle("hidden", mode !== "valid_runs");
        schedulePreview();
      };
      const setStartMode = (mode) => {
        startMode = mode;
        $("start-now").classList.toggle("active", mode === "now");
        $("start-schedule").classList.toggle("active", mode === "schedule");
        $("schedule-field").classList.toggle("hidden", mode !== "schedule");
        schedulePreview();
      };
      const syncVariants = () => {
        const experimentId = $("experiment").value;
        for (const option of $("variant").options) {
          option.hidden = Boolean(option.value && experimentId && option.dataset.experimentId !== experimentId);
        }
        if ($("variant").selectedOptions[0]?.hidden) $("variant").value = "";
      };
      const renderCampaigns = async () => {
        const rows = await request("/api/v1/test-batches");
        $("campaigns").innerHTML = rows.slice(0, 20).map((row) => {
          const streamed = row.planned_stream_seconds
            ? `${fmtDuration((row.valid_run_count || 0) * (row.planned_stream_seconds / Math.max(1, row.target_valid_runs)))} / ${fmtDuration(row.planned_stream_seconds)}`
            : "-";
          const actions = `<a href="/test-batches/${row.batch_id}">View</a>`;
          return `
            <tr>
              <td>${row.name}</td>
              <td>${row.test_profile_slug || row.protocol_slug}</td>
              <td>${row.valid_run_count} / ${row.target_valid_runs} valid runs</td>
              <td>${streamed}</td>
              <td>${row.state}</td>
              <td>${actions}</td>
            </tr>`;
        }).join("") || "<tr><td colspan=\"6\" class=\"muted\">No campaigns yet.</td></tr>";
      };
      const loadProfiles = async () => {
        profiles = await request("/api/v1/test-profiles");
        $("profile").innerHTML = profiles.map((profile) => `
          <option value="${profile.slug}" ${profile.default ? "selected" : ""}>${profile.name}</option>
        `).join("");
        renderProfile();
        await renderPreview();
      };
      $("mode-streamed").addEventListener("click", () => setTargetMode("streamed_time"));
      $("mode-runs").addEventListener("click", () => setTargetMode("valid_runs"));
      $("start-now").addEventListener("click", () => setStartMode("now"));
      $("start-schedule").addEventListener("click", () => setStartMode("schedule"));
      $("profile").addEventListener("change", () => { renderProfile(); schedulePreview(); });
      for (const id of ["target-value", "target-unit", "target-runs", "router", "antenna", "experiment", "variant", "start-at"]) {
        $(id).addEventListener("input", () => { syncVariants(); schedulePreview(); });
        $(id).addEventListener("change", () => { syncVariants(); schedulePreview(); });
      }
      document.querySelector(".quick").addEventListener("click", (event) => {
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        const hours = target.getAttribute("data-hours");
        if (!hours) return;
        setTargetMode("streamed_time");
        $("target-unit").value = "hours";
        $("target-value").value = hours;
        schedulePreview();
      });
      $("create-campaign").addEventListener("click", async () => {
        $("create-campaign").disabled = true;
        try {
          const row = await request("/api/v1/test-campaigns", {
            method: "POST",
            body: JSON.stringify(payload())
          });
          $("message").textContent = `Created ${row.campaign_id}`;
          await renderCampaigns();
        } catch (error) {
          $("message").textContent = error.message;
        } finally {
          await renderPreview();
        }
      });
      $("refresh-campaigns").addEventListener("click", renderCampaigns);
      syncVariants();
      loadProfiles().catch((error) => { $("preview").textContent = error.message; });
      renderCampaigns().catch((error) => { $("message").textContent = error.message; });
    </script>
  </body>
</html>
